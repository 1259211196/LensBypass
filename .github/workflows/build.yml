name: Build LensBypass

# 触发条件：当你 push 代码到 main 目录，或者在 GitHub 网页上手动点击运行时触发
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Tweak
    # 使用苹果 macOS 虚拟机，因为编译 iOS 底层库依赖 Xcode 环境最稳妥
    runs-on: macos-latest
    
    # 设置 Theos 环境变量路径
    env:
      THEOS: ${{ github.workspace }}/theos

    steps:
      - name: 检出你的代码 (Checkout code)
        uses: actions/checkout@v4

      - name: 安装底层依赖环境 (Install dependencies)
        run: |
          brew install ldid dpkg make

      - name: 下载并配置 Theos 框架 (Setup Theos)
        run: |
          git clone --recursive https://github.com/theos/theos.git $THEOS

      - name: 下载 iOS 编译 SDK (Setup iOS SDKs)
        run: |
          git clone https://github.com/theos/sdks.git $THEOS/sdks

      - name: 开始核心编译 (Build Tweak)
        run: |
          # 开启 FINALPACKAGE=1 会生成 Release 版本，体积更小，并去掉调试符号
          make package FINALPACKAGE=1

      - name: 提取并上传 Dylib 成品 (Upload Dylib)
        uses: actions/upload-artifact@v4
        with:
          name: LensBypass-Dylib
          # 编译完成后，真正的胖格式 (arm64+arm64e) dylib 会生成在隐藏目录 .theos/obj 下
          path: .theos/obj/*.dylib
          
      - name: 提取并上传 DEB 安装包 (Upload DEB)
        uses: actions/upload-artifact@v4
        with:
          name: LensBypass-DEB
          path: packages/*.deb
