name: Build LensBypass

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Tweak
    runs-on: macos-latest
    
    env:
      THEOS: ${{ github.workspace }}/theos

    steps:
      - name: 检出你的代码 (Checkout code)
        uses: actions/checkout@v4

      - name: 安装底层依赖环境 (Install dependencies)
        run: |
          brew install ldid dpkg make

      - name: 下载并配置 Theos 框架 (Setup Theos)
        run: |
          git clone --recursive https://github.com/theos/theos.git $THEOS

      - name: 下载 iOS 编译 SDK (Setup iOS SDKs)
        run: |
          rm -rf $THEOS/sdks
          git clone https://github.com/theos/sdks.git $THEOS/sdks

      - name: 开始核心编译 (Build Tweak)
        run: |
          make package FINALPACKAGE=1

      - name: 提取并上传 Dylib 成品 (Upload Dylib)
        uses: actions/upload-artifact@v4
        with:
          name: LensBypass-Dylib
          path: .theos/obj/*.dylib
          
      - name: 提取并上传 DEB 安装包 (Upload DEB)
        uses: actions/upload-artifact@v4
        with:
          name: LensBypass-DEB
          path: packages/*.deb
